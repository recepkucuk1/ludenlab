name: Deploy Hub (static → Hostinger FTP)

on:
  push:
    branches: [main]
    paths:
      - "apps/hub/**"
      - "packages/ui/**"
      - "pnpm-lock.yaml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # FTP secret'ları tanımlı değilse deploy'u sessizce atla (job yeşil kalır,
      # başarısızlık maili gelmez). HUB_FTP_* eklenince otomatik çalışır.
      - name: FTP secret'ları kontrol et
        id: guard
        env:
          FTP_SERVER: ${{ secrets.HUB_FTP_SERVER }}
        run: |
          if [ -n "$FTP_SERVER" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::HUB_FTP_* secrets tanımlı değil — hub deploy atlandı."
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.ready == 'true'

      - uses: pnpm/action-setup@v4
        if: steps.guard.outputs.ready == 'true'
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.ready == 'true'
        with:
          node-version: 22
          cache: pnpm

      - if: steps.guard.outputs.ready == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build hub (static export → apps/hub/out)
        if: steps.guard.outputs.ready == 'true'
        run: pnpm --filter @ludenlab/hub build

      - name: Deploy via FTP
        if: steps.guard.outputs.ready == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HUB_FTP_SERVER }}
          username: ${{ secrets.HUB_FTP_USERNAME }}
          password: ${{ secrets.HUB_FTP_PASSWORD }}
          local-dir: ./apps/hub/out/
          server-dir: ${{ secrets.HUB_FTP_DIR }}
          dangerous-clean-slate: true
