name: CI

on:
  push:
    branches: [main]
  pull_request:

# GH Actions Node 20→24 geçişi (zorunlu: 16 Haz 2026) — JS action'larını şimdiden Node 24'e al
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Lint advisory (job'u bloklamaz) — göç edilen studio kodunda pre-existing borç +
      # eslint-config plugin eksiği var; deploy'u etkilemez. Asıl kapılar: typecheck + build.
      # Düzgün lint temizliği ayrı iş (no-explicit-any→warn + react-hooks/next plugin yükle).
      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
